<?xml version="1.0" encoding="UTF-8"?>
<!-- Main icon: dark badge + authentic Cosmos DB logo centered (planet at the
     center of the top area) + shell prompt bar. The logo is embedded as a
     nested <svg> preserving the original 18x18 composition so planet, clouds,
     swoosh ring, and both sparkles render exactly as in CosmosDBAccount.svg. -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2b3a"/>
      <stop offset="1" stop-color="#0b1320"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5ea0ef" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5ea0ef" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Badge -->
  <rect x="8" y="8" width="240" height="240" rx="44" ry="44" fill="url(#bgGrad)"/>
  <rect x="8" y="8" width="240" height="240" rx="44" ry="44" fill="none" stroke="#2a3a52" stroke-width="2"/>

  <!-- Glow behind the planet (planet centered at 128, 92) -->
  <circle cx="128" cy="92" r="76" fill="url(#glow)"/>

  <!-- Cosmos DB logo: size 160, viewBox centered at icon x-center (128) so it
       lines up with the shell bar below; planet at (128, 92).
       left = 128 - 160/2 = 48 ; top = 92 - 160*(7.53/18) = 92 - 66.93 = 25.07 -->
  <svg x="48" y="25.07" width="160" height="160" viewBox="0 0 18 18">
    <defs>
      <radialGradient id="pg0" cx="-105.006" cy="-10.409" r="5.954"
                      gradientTransform="translate(117.739 19.644) scale(1.036 1.027)"
                      gradientUnits="userSpaceOnUse">
        <stop offset="0.183" stop-color="#5ea0ef"/>
        <stop offset="1" stop-color="#0078d4"/>
      </radialGradient>
      <clipPath id="pc0">
        <path d="M14.969,7.53A6.137,6.137,0,1,1,7.574,2.987,6.137,6.137,0,0,1,14.969,7.53Z"/>
      </clipPath>
    </defs>
    <path d="M2.954,5.266a.175.175,0,0,1-.176-.176h0A2.012,2.012,0,0,0,.769,3.081a.176.176,0,0,1-.176-.175h0a.176.176,0,0,1,.176-.176A2.012,2.012,0,0,0,2.778.72.175.175,0,0,1,2.954.544h0A.175.175,0,0,1,3.13.72h0A2.012,2.012,0,0,0,5.139,2.729a.175.175,0,0,1,.176.176h0a.175.175,0,0,1-.176.176h0A2.011,2.011,0,0,0,3.13,5.09.177.177,0,0,1,2.954,5.266Z" fill="#50e6ff"/>
    <path d="M15.611,17.456a.141.141,0,0,1-.141-.141h0a1.609,1.609,0,0,0-1.607-1.607.141.141,0,0,1-.141-.14h0a.141.141,0,0,1,.141-.141h0a1.608,1.608,0,0,0,1.607-1.607.141.141,0,0,1,.141-.141h0a.141.141,0,0,1,.141.141h0a1.608,1.608,0,0,0,1.607,1.607.141.141,0,1,1,0,.282h0a1.609,1.609,0,0,0-1.607,1.607A.141.141,0,0,1,15.611,17.456Z" fill="#50e6ff"/>
    <g>
      <path d="M14.969,7.53A6.137,6.137,0,1,1,7.574,2.987,6.137,6.137,0,0,1,14.969,7.53Z" fill="url(#pg0)"/>
      <g clip-path="url(#pc0)">
        <path d="M5.709,13.115A1.638,1.638,0,1,0,5.714,9.84,1.307,1.307,0,0,0,5.721,9.7,1.651,1.651,0,0,0,4.06,8.064H2.832a6.251,6.251,0,0,0,1.595,5.051Z" fill="#f2f2f2"/>
        <path d="M15.045,7.815c0-.015,0-.03-.007-.044a5.978,5.978,0,0,0-1.406-2.88,1.825,1.825,0,0,0-.289-.09,1.806,1.806,0,0,0-2.3,1.663,2,2,0,0,0-.2-.013,1.737,1.737,0,0,0-.581,3.374,1.451,1.451,0,0,0,.541.1h2.03A13.453,13.453,0,0,0,15.045,7.815Z" fill="#f2f2f2"/>
      </g>
    </g>
    <path d="M17.191,3.832c-.629-1.047-2.1-1.455-4.155-1.149a14.606,14.606,0,0,0-2.082.452,6.456,6.456,0,0,1,1.528.767c.241-.053.483-.116.715-.151A7.49,7.49,0,0,1,14.3,3.662a2.188,2.188,0,0,1,1.959.725h0c.383.638.06,1.729-.886,3a16.723,16.723,0,0,1-4.749,4.051A16.758,16.758,0,0,1,4.8,13.7c-1.564.234-2.682,0-3.065-.636s-.06-1.73.886-2.995c.117-.157.146-.234.279-.392a6.252,6.252,0,0,1,.026-1.63A11.552,11.552,0,0,0,1.756,9.419C.517,11.076.181,12.566.809,13.613a3.165,3.165,0,0,0,2.9,1.249,8.434,8.434,0,0,0,1.251-.1,17.855,17.855,0,0,0,6.219-2.4,17.808,17.808,0,0,0,5.061-4.332C17.483,6.369,17.819,4.88,17.191,3.832Z" fill="#50e6ff"/>
  </svg>

  <!-- Shell prompt bar: "$  SHELL  ▌" centered as a single line inside the bar.
       Local layout width ≈ 118 (see pieces below); translate centers it on x=128. -->
  <rect x="40" y="196" width="176" height="40" rx="10" ry="10" fill="#0f1a2a" stroke="#2a3a52" stroke-width="2"/>
  <g transform="translate(69 2)"
     font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" fill="#e6eef9">
    <!-- Cyan ">" prompt -->
    <text x="0" y="222" font-size="26" fill="#50e6ff">&gt;</text>
    <!-- "SHELL" wordmark with fixed textLength for predictable centering -->
    <text x="24" y="221" font-size="18" letter-spacing="4"
          textLength="70" lengthAdjust="spacingAndGlyphs">SHELL</text>
    <!-- Caret/cursor block, vertically centered on the text -->
    <rect x="106" y="206" width="12" height="17" rx="2" ry="2" fill="#f2f2f2"/>
  </g>
</svg>
