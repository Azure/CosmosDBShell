# Version configuration for CosmosDBShell.
#
# The build pipelines read `next-version` from this file to get the
# Major.Minor portion of the build version, and compute the patch number
# as the count of commits since this file was last modified. That keeps
# the version dependent only on this file and independent of any git
# tags in the repository.
#
# To start a new release line, bump next-version (e.g. 1.2.0) and commit;
# the commit counter resets automatically because it counts commits since
# that change.
#
# The file is named GitVersion.yml for backward compatibility with earlier
# tooling; GitVersion itself is no longer invoked.

next-version: 1.1.0
